// ─── Utility helpers ──────────────────────────────────────────────────────────
function getDecimals(p) {
  if (["BTC/USD","US30","NAS100","GER40","UK100","US500","ETH/USD","SOL/USD","XAU/USD","XPT/USD","XAG/USD"].includes(p)) return 2;
  if (["USD/JPY","EUR/JPY","GBP/JPY"].includes(p)) return 3;
  return 4;
}
function getPipSize(p) {
  if (["USD/JPY","EUR/JPY","GBP/JPY"].includes(p)) return 0.01;
  if (["BTC/USD","US30","NAS100","GER40","UK100","US500","ETH/USD","SOL/USD","XAU/USD","XAG/USD","XPT/USD"].includes(p)) return 1;
  return 0.0001;
}
function getVolatility(p) {
  if (p==="BTC/USD") return 0.008;
  if (["ETH/USD","SOL/USD"].includes(p)) return 0.006;
  if (["US30","NAS100","GER40"].includes(p)) return 0.003;
  if (p==="XAU/USD") return 0.002;
  if (["USD/JPY","EUR/JPY","GBP/JPY"].includes(p)) return 0.002;
  return 0.0012;
}
function getSpread(p) {
  if (["BTC/USD","ETH/USD"].includes(p)) return 10;
  if (["US30","NAS100","GER40","UK100","US500"].includes(p)) return 1;
  if (p==="XAU/USD") return 0.3;
  return 0.0003;
}
function getUTCHour() { return new Date().getUTCHours()+new Date().getUTCMinutes()/60; }
function isSessionActive(s) { const h=getUTCHour(); return s.open<s.close?h>=s.open&&h<s.close:h>=s.open||h<s.close; }
function sessionCountdown(s) {
  const now=getUTCHour(), target=isSessionActive(s)?s.close:s.open;
  const diff=target>now?target-now:24-now+target;
  const h=Math.floor(diff), m=Math.floor((diff-h)*60);
  return isSessionActive(s)?`Closes in ${h}h ${m}m`:`Opens in ${h}h ${m}m`;
}
function loadLS(key, fallback) {
  try { const v=localStorage.getItem(key); return v!=null?JSON.parse(v):fallback; } catch(e) { return fallback; }
}
function saveLS(key, val) { try { localStorage.setItem(key,JSON.stringify(val)); } catch(e) {} }

// ─── MACD ─────────────────────────────────────────────────────────────────────
function calcEMA(data, period) {
  const k=2/(period+1); let prev=data[0];
  return data.map((v,i)=>{ const e=i===0?data[0]:v*k+prev*(1-k); prev=e; return e; });
}
function calcMACD(candles) {
  if (candles.length<35) return {macdLine:[],signalLine:[],histogram:[],signals:[]};
  const closes=candles.map(c=>c.c);
  const ema12=calcEMA(closes,12), ema26=calcEMA(closes,26);
  const macdLine=ema12.map((v,i)=>v-ema26[i]);
  const signalLine=calcEMA(macdLine,9);
  const histogram=macdLine.map((v,i)=>v-signalLine[i]);
  const signals=[];
  for (let i=1;i<macdLine.length;i++) {
    const pc=macdLine[i-1]-signalLine[i-1], cc=macdLine[i]-signalLine[i];
    if (pc<0&&cc>=0) signals.push({i,type:"buy"});
    else if (pc>0&&cc<=0) signals.push({i,type:"sell"});
  }
  return {macdLine,signalLine,histogram,signals};
}
function getMACDStrength(histogram) {
  if (!histogram.length) return "—";
  const last=histogram[histogram.length-1];
  if (isNaN(last)) return "—";
  const max=Math.max(...histogram.filter(v=>!isNaN(v)).map(Math.abs))||1;
  const r=Math.abs(last)/max;
  if (r>0.6) return "Strong";
  if (r>0.3) return "Medium";
  return "Weak";
}

// ─── Multi-timeframe MACD ─────────────────────────────────────────────────────
function getMTFSignals(candles) {
  const tfs = [
    { label:"15m", slice:20 },
    { label:"1h",  slice:40 },
    { label:"4h",  slice:60 },
  ];
  return tfs.map(tf => {
    const subset=candles.slice(-tf.slice);
    const macd=calcMACD(subset);
    const last=macd.signals.length?macd.signals[macd.signals.length-1]:null;
    const strength=getMACDStrength(macd.histogram);
    const aligned=last&&(subset.length-last.i)<=5;
    return { tf:tf.label, signal:aligned?last.type:null, strength };
  });
}

// ─── Confluence ───────────────────────────────────────────────────────────────
function getConfluence(pair, candles, prices) {
  let score=0;
  const macd=calcMACD(candles);
  if (macd.signals.length) {
    const last=macd.signals[macd.signals.length-1];
    const recency=candles.length-last.i;
    if (recency<=3) score+=3; else if (recency<=10) score+=2; else score+=1;
  }
  score+=SESSIONS.filter(s=>isSessionActive(s)).length;
  const p=prices[pair]; if (p&&p.change!==0) score+=1;
  const s=getMACDStrength(macd.histogram);
  if (s==="Strong") score+=3; else if (s==="Medium") score+=2; else score+=1;
  return Math.min(10,score);
}
function confluenceColor(score, C) {
  if (score>=7) return C.accent;
  if (score>=4) return C.warn;
  return C.danger;
}

// ─── Trade grade ──────────────────────────────────────────────────────────────
function gradeTrade(trade, calcResult) {
  if (!trade||!calcResult) return null;
  let pts=0;
  if (trade.pair===calcResult.pair) pts++;
  if (trade.type===calcResult.direction) pts++;
  const pips=parseFloat(trade.pips||0);
  const target=parseFloat(calcResult.pips||0);
  if (pips>0&&target>0&&pips>=target*0.9) pts++;
  if (pips>0) pts++;
  if (pts>=4) return "A";
  if (pts>=3) return "B";
  return "C";
}
function gradeColor(grade) {
  if (grade==="A") return "#26a69a";
  if (grade==="B") return "#FF9800";
  return "#ef5350";
}

// ─── Candle generation ────────────────────────────────────────────────────────
function generateCandles(pair, count=80) {
  const dec=getDecimals(pair), vol=getVolatility(pair), base=BASE_PRICES[pair]||1;
  let close=base*(0.97+Math.random()*0.06);
  const candles=[], now=Date.now();
  for (let i=count;i>=0;i--) {
    const move=close*vol*(Math.random()*2-1), open=close;
    close=Math.max(base*0.85,open+move);
    const range=Math.abs(move)*1.5+base*vol*0.3;
    candles.push({t:now-i*5*60*1000,
      o:+open.toFixed(dec),h:+(Math.max(open,close)+range*Math.random()).toFixed(dec),
      l:+(Math.min(open,close)-range*Math.random()).toFixed(dec),c:+close.toFixed(dec)});
  }
  return candles;
}
const CANDLE_HISTORY={};
ALL_PAIRS.forEach(p=>{ CANDLE_HISTORY[p]=generateCandles(p,80); });

// ─── CandleChart ──────────────────────────────────────────────────────────────
function CandleChart({ pair, candles, currentPrice, calcResult, darkMode, C }) {
  const svgRef=useRef(null);
  const [tooltip,setTooltip]=useState(null);
  const [crosshair,setCrosshair]=useState(null);
  const [offset,setOffset]=useState(0);
  const touchStartX=useRef(null);

  const W=370,H=210,PL=8,PR=56,PT=10,PB=20;
  const MH=88, MPT=8, MPB=16;
  const cW=W-PL-PR, cH=H-PT-PB;

  const windowSize=50;
  const maxOffset=Math.max(0,candles.length-windowSize);
  const startIdx=Math.max(0,candles.length-windowSize-offset);
  const visible=candles.slice(startIdx,startIdx+windowSize);
  const N=visible.length;
  if (N===0) return null;

  const allH=visible.map(c=>c.h), allL=visible.map(c=>c.l);
  const maxP=Math.max(...allH), minP=Math.min(...allL);
  const pad=(maxP-minP)*0.12||maxP*0.001;
  const hi=maxP+pad, lo=minP-pad, range=hi-lo||1;
  const xScale=i=>PL+(i/(N-1||1))*cW;
  const yScale=p=>PT+cH-((p-lo)/range)*cH;
  const candleW=Math.max(3,(cW/N)*0.65);
  const dec=getDecimals(pair);

  const fullMACD=calcMACD(candles);
  const macdStart=candles.indexOf(visible[0]);
  const macdSlice=fullMACD.macdLine.slice(macdStart,macdStart+N);
  const sigSlice=fullMACD.signalLine.slice(macdStart,macdStart+N);
  const histSlice=fullMACD.histogram.slice(macdStart,macdStart+N);
  const visSignals=fullMACD.signals.filter(s=>s.i>=macdStart&&s.i<macdStart+N).map(s=>({...s,vi:s.i-macdStart}));
  const lastSignal=visSignals.length?visSignals[visSignals.length-1]:null;
  const mAllVals=[...macdSlice,...sigSlice].filter(v=>!isNaN(v));
  const mMax=mAllVals.length?Math.max(...mAllVals.map(Math.abs))*1.4:1;
  const mCH=MH-MPT-MPB, mMid=MPT+mCH/2;
  const mY=v=>mMid-(v/mMax)*(mCH/2);
  const mX=i=>PL+(i/(N-1||1))*cW;

  const priceLabels=Array.from({length:4},(_,i)=>{
    const p=lo+(range/3)*i; return {y:yScale(p),label:p.toFixed(dec)};
  });

  // TP/SL/Entry from plan
  const hasLevels=calcResult&&calcResult.pair===pair&&calcResult.entryPrice;
  const entryY=hasLevels?yScale(parseFloat(calcResult.entryPrice)):null;
  const tpY=hasLevels&&calcResult.exitPrice?yScale(parseFloat(calcResult.exitPrice)):null;
  const slY=hasLevels&&calcResult.stopLossPrice?yScale(parseFloat(calcResult.stopLossPrice)):null;

  function handleMove(e) {
    const rect=svgRef.current?.getBoundingClientRect(); if(!rect) return;
    const isT=e.touches; const cx=isT?e.touches[0].clientX:e.clientX, cy=isT?e.touches[0].clientY:e.clientY;
    const mx=cx-rect.left, my=cy-rect.top;
    const idx=Math.round(((mx-PL)/cW)*(N-1));
    if (idx>=0&&idx<N) {
      const c=visible[idx]; setCrosshair({x:xScale(idx),y:my});
      setTooltip({x:xScale(idx),y:Math.max(28,Math.min(my,H-55)),c,
        time:new Date(c.t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
        macd:macdSlice[idx],sig:sigSlice[idx],hist:histSlice[idx]});
    }
  }

          <line x1={PL} y1={slY} x2={W-PR} y2={slY} stroke={bear} strokeWidth={1.2} strokeDasharray="5,3"/>
          <rect x={W-PR+2} y={slY-8} width={PR-4} height={16} fill={bear} rx={3} opacity={0.92}/>
          <text x={W-PR+PR/2} y={slY+4} textAnchor="middle" fontSize={8} fontWeight="700" fill="#fff">SL</text>
        </g>)}
        {entryY!==null&&entryY>=PT&&entryY<=H-PB&&(<g>
          <line x1={PL} y1={entryY} x2={W-PR} y2={entryY} stroke={C.warn} strokeWidth={1} strokeDasharray="3,3"/>
          <rect x={W-PR+2} y={entryY-8} width={PR-4} height={16} fill={C.warn} rx={3} opacity={0.92}/>
          <text x={W-PR+PR/2} y={entryY+4} textAnchor="middle" fontSize={7} fontWeight="700" fill="#0D1421">ENTRY</text>
        </g>)}

        {visible.map((c,i)=>{
          const x=xScale(i),isBull=c.c>=c.o,col=isBull?bull:bear;
          const bodyY=yScale(Math.max(c.o,c.c)),bodyH=Math.max(1,Math.abs(yScale(c.o)-yScale(c.c)));
          return (<g key={i}>
            <line x1={x} y1={yScale(c.h)} x2={x} y2={yScale(c.l)} stroke={col} strokeWidth={1}/>
            <rect x={x-candleW/2} y={bodyY} width={candleW} height={bodyH} fill={isBull?bull:"none"} stroke={col} strokeWidth={isBull?0:1.2} rx={1}/>
          </g>);
        })}

        {visSignals.map((sig,i)=>{
          const x=xScale(sig.vi),c=visible[sig.vi]; if(!c) return null;
          if (sig.type==="buy"){const ay=yScale(c.l)-18;return <g key={i}><polygon points={`${x},${ay+14} ${x-7},${ay} ${x+7},${ay}`} fill={bull} opacity={0.95}/><text x={x} y={ay-3} textAnchor="middle" fontSize={8} fontWeight="800" fill={bull}>BUY</text></g>;}
          const ay=yScale(c.h)+18;return <g key={i}><polygon points={`${x},${ay-14} ${x-7},${ay} ${x+7},${ay}`} fill={bear} opacity={0.95}/><text x={x} y={ay+10} textAnchor="middle" fontSize={8} fontWeight="800" fill={bear}>SELL</text></g>;
        })}

        {currentPrice&&(<g>
          <line x1={PL} y1={yScale(currentPrice)} x2={W-PR} y2={yScale(currentPrice)} stroke={C.accent} strokeWidth={1} strokeDasharray="4,3"/>
          <rect x={W-PR+2} y={yScale(currentPrice)-9} width={PR-4} height={18} fill={C.accent} rx={3}/>

        </g>)}

        {priceLabels.map((pl,i)=>(<text key={i} x={W-PR+4} y={pl.y+4} fontSize={8} fill={textCol}>{pl.label}</text>))}

        {crosshair&&(<>
          <line x1={crosshair.x} y1={PT} x2={crosshair.x} y2={H-PB} stroke={darkMode?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.15)"} strokeWidth={1} strokeDasharray="3,3"/>
          <line x1={PL} y1={crosshair.y} x2={W-PR} y2={crosshair.y} stroke={darkMode?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.15)"} strokeWidth={1} strokeDasharray="3,3"/>
        </>)}

        {tooltip&&(()=>{
          const c=tooltip.c,isBull=c.c>=c.o,tx=Math.min(tooltip.x+8,W-PR-120);

            <rect x={tx} y={tooltip.y-2} width={118} height={hasMCD?82:62} fill={darkMode?"#1A2340":"#F7FAFC"} stroke={C.border} rx={6} opacity={0.96}/>
            <text x={tx+6} y={tooltip.y+13} fontSize={8.5} fill={textCol}>O:<tspan fill={C.text} fontWeight="600"> {c.o.toFixed(dec)}</tspan>{"  "}H:<tspan fill={bull} fontWeight="600"> {c.h.toFixed(dec)}</tspan></text>
            <text x={tx+6} y={tooltip.y+26} fontSize={8.5} fill={textCol}>L:<tspan fill={bear} fontWeight="600"> {c.l.toFixed(dec)}</tspan>{"  "}C:<tspan fill={isBull?bull:bear} fontWeight="600"> {c.c.toFixed(dec)}</tspan></text>
            <text x={tx+6} y={tooltip.y+39} fontSize={8} fill={textCol}>{tooltip.time}</text>
            {hasMCD&&(<>
              <text x={tx+6} y={tooltip.y+53} fontSize={8} fill={textCol}>MACD:<tspan fill={macdCol} fontWeight="600"> {tooltip.macd?.toFixed(5)}</tspan></text>
              <text x={tx+6} y={tooltip.y+66} fontSize={8} fill={textCol}>Sig:<tspan fill={sigCol} fontWeight="600"> {tooltip.sig?.toFixed(5)}</tspan></text>
            </>)}
            <text x={tx+6} y={tooltip.y+(hasMCD?80:52)} fontSize={8} fill={isBull?bull:bear} fontWeight="700">{isBull?"▲ Bullish":"▼ Bearish"}</text>
          </g>);
        })()}

        {[0,Math.floor(N/4),Math.floor(N/2),Math.floor(3*N/4),N-1].map(i=>{
          if(i>=N) return null;
          return <text key={i} x={xScale(i)} y={H-4} textAnchor="middle" fontSize={8} fill={textCol}>{new Date(visible[i].t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</text>;

      </svg>

      {/* Swipe hint */}
      {maxOffset>0&&(
        <div style={{textAlign:"center",fontSize:9,color:textCol,padding:"2px 0",borderBottom:`1px solid ${grid}`}}>

      )}

      {/* MACD sub-chart */}
      <div style={{borderTop:`1px solid ${grid}`,paddingTop:2}}>
        <div style={{display:"flex",alignItems:"center",gap:7,padding:"3px 8px 2px",flexWrap:"wrap"}}>

          <span style={{fontSize:9,color:macdCol}}>● MACD</span>
          <span style={{fontSize:9,color:sigCol}}>● Signal</span>
          <span style={{fontSize:9,fontWeight:700,color:strength==="Strong"?C.accent:strength==="Medium"?C.warn:C.dim}}>Strength: {strength}</span>
          {lastSignal&&(<span style={{marginLeft:"auto",fontSize:9,fontWeight:800,
            color:lastSignal.type==="buy"?bull:bear,
            background:lastSignal.type==="buy"?"rgba(38,166,154,0.15)":"rgba(239,83,80,0.15)",
            padding:"1px 6px",borderRadius:6,border:`1px solid ${lastSignal.type==="buy"?bull:bear}`}}>
            {lastSignal.type==="buy"?"▲ BUY":"▼ SELL"}
          </span>)}
        </div>
        <svg width={W} height={MH} style={{display:"block",width:"100%",height:"auto"}}>
          <line x1={PL} y1={mMid} x2={W-PR} y2={mMid} stroke={darkMode?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.1)"} strokeWidth={1} strokeDasharray="2,3"/>
          {histSlice.map((v,i)=>{if(isNaN(v)||v===0) return null; const bH=Math.abs(mY(v)-mMid),bY=v>=0?mMid-bH:mMid,bw=Math.max(2,(cW/N)*0.6); return <rect key={i} x={mX(i)-bw/2} y={bY} width={bw} height={Math.max(1,bH)} fill={v>=0?"rgba(38,166,154,0.5)":"rgba(239,83,80,0.5)"}/>;} )}
          {macdSlice.length>1&&(()=>{ const pts=macdSlice.map((v,i)=>isNaN(v)?null:`${mX(i)},${mY(v)}`).filter(Boolean).join(" "); return <polyline points={pts} fill="none" stroke={macdCol} strokeWidth={1.5}/>; })()}
          {sigSlice.length>1&&(()=>{ const pts=sigSlice.map((v,i)=>isNaN(v)?null:`${mX(i)},${mY(v)}`).filter(Boolean).join(" "); return <polyline points={pts} fill="none" stroke={sigCol} strokeWidth={1.5} strokeDasharray="3,2"/>; })()}
          {visSignals.map((sig,i)=>{ const mv=macdSlice[sig.vi]; if(isNaN(mv)) return null; return <circle key={i} cx={mX(sig.vi)} cy={mY(mv)} r={4} fill={sig.type==="buy"?bull:bear} stroke={bg} strokeWidth={1.5}/>; })}
          {macdSlice.length>0&&!isNaN(macdSlice[macdSlice.length-1])&&(
            <text x={W-PR+4} y={mY(macdSlice[macdSlice.length-1])+4} fontSize={7} fill={macdCol}>{macdSlice[macdSlice.length-1].toFixed(4)}</text>
          )}
        </svg>
      </div>
    </div>
  );
}

// ─── Live price hook ───────────────────────────────────────────────────────────
function useLivePrices() {
  const [prices,setPrices]=useState(()=>{
    const p={};
    ALL_PAIRS.forEach(pair=>{ const dec=getDecimals(pair),base=BASE_PRICES[pair]||1; p[pair]={bid:base,ask:+(base+getSpread(pair)).toFixed(dec),change:0,decimals:dec}; });
    return p;
  });
  const candlesRef=useRef(CANDLE_HISTORY);
  useEffect(()=>{
    const id=setInterval(()=>{
      setPrices(prev=>{
        const next={...prev};
        ALL_PAIRS.forEach(pair=>{
          const vol=getVolatility(pair),dec=getDecimals(pair);
          const delta=(Math.random()-0.5)*prev[pair].bid*vol*0.4;
          const newBid=+((prev[pair].bid+delta).toFixed(dec));
          next[pair]={bid:newBid,ask:+(newBid+getSpread(pair)).toFixed(dec),change:delta>0?1:-1,decimals:dec};
          const hist=candlesRef.current[pair];
          if (hist&&hist.length>0){ const last={...hist[hist.length-1]}; last.c=newBid;last.h=Math.max(last.h,newBid);last.l=Math.min(last.l,newBid); hist[hist.length-1]=last; }
        });
        return next;
      });
    },2000);
    return ()=>clearInterval(id);
  },[]);
  return {prices,candlesRef};
}

// ─── PIN Screen ───────────────────────────────────────────────────────────────
function PinScreen({ onUnlock, darkMode, C }) {
  const savedPin=loadLS("fpro_pin",null);
  const [input,setInput]=useState("");
  const [isSetup,setIsSetup]=useState(!savedPin);
  const [confirm,setConfirm]=useState("");
  const [stage,setStage]=useState("enter"); // enter | confirm
  const [shake,setShake]=useState(false);
  const [msg,setMsg]=useState(isSetup?"Create a 4-digit PIN":"Enter your PIN");

  function handleDigit(d) {
    if (isSetup) {
      if (stage==="enter") {
        const next=input+d;
        setInput(next);
        if (next.length===4){setConfirm(next);setInput("");setStage("confirm");setMsg("Confirm your PIN");}
      } else {
        const next=input+d;
        setInput(next);
        if (next.length===4){
          if (next===confirm){saveLS("fpro_pin",next);onUnlock();}
          else {setShake(true);setInput("");setMsg("PINs don't match. Try again.");setTimeout(()=>setShake(false),500);}
        }
      }
    } else {
      const next=input+d;
      setInput(next);
      if (next.length===4){
        if (next===savedPin){onUnlock();}
        else {setShake(true);setInput("");setMsg("Wrong PIN");setTimeout(()=>{setShake(false);setMsg("Enter your PIN");},600);}
      }
    }
  }
  function handleDel(){setInput(p=>p.slice(0,-1));}

  return (
    <div style={{position:"fixed",inset:0,background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:900,fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>
      <div style={{fontSize:28,marginBottom:8}}>🔐</div>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:4}}>Forex<span style={{color:C.accent}}>Pro</span></div>
      <div style={{fontSize:13,color:C.muted,marginBottom:28}}>{msg}</div>
      <div style={{display:"flex",gap:14,marginBottom:32,animation:shake?"shake 0.4s":"none"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<input.length?C.accent:C.border,transition:"background 0.15s",boxShadow:i<input.length?`0 0 8px ${C.accent}88`:"none"}}/>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,width:240}}>
        {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=>(
          <TapButton key={i} onClick={d===""?undefined:d==="⌫"?handleDel:()=>handleDigit(String(d))}
            style={{height:60,borderRadius:14,background:d===""?"transparent":C.surface,
              border:d===""?"none":`1px solid ${C.border}`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:d==="⌫"?20:22,fontWeight:700,color:C.text,
              opacity:d===""?0:1}}>
            {d}
          </TapButton>
        ))}
      </div>
      {!isSetup&&(
        <TapButton onClick={()=>{saveLS("fpro_pin",null);setIsSetup(true);setInput("");setMsg("Create a new PIN");}}
          style={{marginTop:20,fontSize:11,color:C.dim,background:"none",border:"none",cursor:"pointer",padding:"4px 8px"}}>
          Forgot PIN? Reset
        </TapButton>
      )}
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

            <div style={{fontSize:10,color:C.muted,marginBottom:9}}>Current: <span style={{color:C.accent,fontWeight:700}}>{prices[alertForm.pair]?.bid?.toFixed(prices[alertForm.pair]?.decimals??4)??"—"}</span></div>
            <div style={{display:"flex",gap:7,marginBottom:9}}>{["above","below"].map(cond=>(<TapButton key={cond} onClick={()=>setAlertForm(p=>({...p,condition:cond}))} style={{flex:1,padding:"9px 5px",borderRadius:11,textAlign:"center",fontWeight:700,fontSize:12,background:alertForm.condition===cond?(cond==="above"?C.accentBg:"rgba(255,107,107,0.12)"):"rgba(128,128,128,0.06)",border:`1.5px solid ${alertForm.condition===cond?(cond==="above"?C.accent:C.danger):C.border}`,color:alertForm.condition===cond?(cond==="above"?C.accent:C.danger):C.dim}}>{cond==="above"?"▲ Price Above":"▼ Price Below"}</TapButton>))}</div>

            <input style={S.input} type="number" placeholder="Pips (+ profit / − loss)" value={tradeForm.pips} onChange={e=>setTradeForm(p=>({...p,pips:e.target.value}))}/>
            <input style={S.input} placeholder="Duration (e.g. 2h 30m)" value={tradeForm.duration} onChange={e=>setTradeForm(p=>({...p,duration:e.target.value}))}/>
            <input style={S.input} placeholder="Notes (optional)" value={tradeForm.note} onChange={e=>setTradeForm(p=>({...p,note:e.target.value}))}/>
            <TapButton onClick={addTrade} style={S.btn(C.warn)}>Log Trade</TapButton>
          </div>
          {trades.length>0&&(<div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Trade History</div>
              <TapButton onClick={exportJournal} style={{background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:8,color:C.accent,padding:"4px 10px",fontSize:10,fontWeight:700}}>📋 Export</TapButton>
            </div>
            {exportText&&(<textarea readOnly value={exportText} style={{...S.input,fontSize:9,height:75,marginBottom:9,fontFamily:"monospace",resize:"none"}}/>)}
            {trades.map(t=>{
              const grade=gradeTrade(t,calcResult);
              return (<TapButton key={t.id} onClick={()=>setTradeDetail(t)} style={{...S.tradeItem,cursor:"pointer"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontWeight:700,fontSize:12}}>{t.pair} · {t.type}</span>
                    {grade&&<span style={{fontSize:10,fontWeight:800,color:gradeColor(grade),background:gradeColor(grade)+"18",padding:"1px 5px",borderRadius:6}}>{grade}</span>}
                  </div>
                  <div style={{fontSize:10,color:C.muted}}>{t.date}{t.duration?` · ⏱ ${t.duration}`:""}</div>
                </div>
                <div style={{fontWeight:800,fontSize:15,color:parseFloat(t.pips)>0?C.accent:C.danger}}>{parseFloat(t.pips)>0?"+":""}{t.pips}</div>
              </TapButton>);
            })}
          </div>)}
        </>)}

        {/* ── GUIDE ── */}
        {activeTab==="guide"&&(<>
          <div style={S.card}>
            <div style={S.cardTitle}>Getting Started</div>
            <div style={{marginBottom:11}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12,color:C.muted}}>Progress</span><span style={{fontWeight:700,fontSize:12,color:C.accent}}>{checklistCount}/{ONBOARDING_STEPS.length}</span></div><div style={{background:darkMode?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.08)",borderRadius:999,height:7,overflow:"hidden"}}><div style={{width:`${(checklistCount/ONBOARDING_STEPS.length)*100}%`,height:"100%",background:`linear-gradient(90deg,${C.accent},${C.accent}88)`,borderRadius:999,transition:"width 0.5s"}}/></div></div>
            {ONBOARDING_STEPS.map(step=>(<div key={step.id} style={{display:"flex",alignItems:"center",gap:11,padding:"9px 0",borderBottom:`1px solid ${C.border}`}}><div style={{width:20,height:20,borderRadius:"50%",background:checklist[step.id]?C.accent:C.border,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:800,color:checklist[step.id]?"#0A0E1A":"transparent"}}>{checklist[step.id]?"✓":""}</div><div style={{fontSize:12,color:checklist[step.id]?C.text:C.dim,textDecoration:checklist[step.id]?"line-through":"none"}}>{step.label}</div></div>))}
            {onboardingComplete&&(<div style={{marginTop:13,background:C.accentBg,border:`1.5px solid ${C.accent}44`,borderRadius:11,padding:13,textAlign:"center"}}><div style={{fontSize:22,marginBottom:3}}>🎉</div><div style={{fontWeight:700,color:C.accent}}>All set! Happy trading.</div></div>)}
          </div>
          <div style={S.card}>
            <div style={S.cardTitle}>📖 Feature Reference</div>
            {[["📊 Dashboard","Daily summary, streak tracker, equity curve, goal progress, session performance breakdown, best/worst trades."],["🕯 Charts","Candlestick + MACD with buy/sell signals, TP/SL/Entry lines, multi-timeframe MACD panel, confluence score, search, swipe to scroll candles, watchlist nav."],["🕐 Sessions","Session live/closed status, countdowns, open alerts, London–NY overlap banner."],["📈 Prices","Build watchlist across Forex, Metals, Crypto, Indexes."],["🎯 Planner","Full trade plan with TP, SL, pips, lot size, R:R. Tap 'View on Chart' to see levels. Data saved automatically."],["⚡ Pip Calc","Quick pip distance calculator — tap the header button."],["🔔 Alerts","Price-level alerts + MACD crossover alerts per watchlisted pair."],["📝 Journal","Economic calendar, trade logging, trade grading (A/B/C), tap any trade for detail sheet, export to clipboard."],["🔐 PIN","4-digit PIN lock. Tap 'Forgot PIN' to reset."],["💾 Auto-save","All data persists automatically between sessions via localStorage."]].map(([title,desc])=>(<div key={title} style={{padding:"9px 0",borderBottom:`1px solid ${C.border}`}}><div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{title}</div><div style={{fontSize:11,color:C.muted}}>{desc}</div></div>))}
          </div>
          <div style={S.card}>
            <div style={S.cardTitle}>⚠️ Reset</div>
            <TapButton onClick={()=>{if(window.confirm("Reset all data?")){["fpro_trades","fpro_plan","fpro_alerts","fpro_triggered","fpro_checklist","fpro_balance","fpro_goal","fpro_watchlist","fpro_pin"].forEach(k=>localStorage.removeItem(k));window.location.reload();}}} style={{...S.btn(C.danger),background:"rgba(255,107,107,0.12)",color:C.danger,border:`1px solid ${C.danger}44`}}>Reset All Data</TapButton>
          </div>
        </>)}

      </div>

      {/* Bottom Nav */}
      <div style={S.bottomNav}>
        {[["dashboard","📊","Home"],["charts","🕯","Charts"],["sessions","🕐","Sessions"],["prices","📈","Prices"],["planner","🎯","Planner"],["alerts","🔔","Alerts"],["journal","📝","Journal"],["guide","✅","Guide"]].map(([id,icon,label])=>(
          <TapButton key={id} onClick={()=>setActiveTab(id)} style={S.navBtn(activeTab===id)}>
            <span style={{fontSize:16}}>{icon}</span>{label}
          </TapButton>
        ))}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ForexPlannerApp));
    document.getElementById("loading").style.display = "none";
  </script>

  <!-- Service Worker registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then(reg => {
          console.log("ForexPro SW registered:", reg.scope);
        }).catch(err => {
          console.log("SW registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
