// ── Helpers ───────────────────────────────────────────────────────────────────
function dec(p){
  if(["BTC/USD","US30","NAS100","GER40","UK100","US500","ETH/USD","SOL/USD","XAU/USD","XPT/USD","XAG/USD"].includes(p))return 2;
  if(["USD/JPY","EUR/JPY","GBP/JPY"].includes(p))return 3;
  return 4;
}
function pipSz(p){
  if(["USD/JPY","EUR/JPY","GBP/JPY"].includes(p))return 0.01;
  if(["BTC/USD","US30","NAS100","GER40","UK100","US500","ETH/USD","SOL/USD","XAU/USD","XAG/USD","XPT/USD"].includes(p))return 1;
  return 0.0001;
}
function spread(p){
  if(["BTC/USD","ETH/USD"].includes(p))return 10;
  if(["US30","NAS100","GER40","UK100","US500"].includes(p))return 2;
  if(p==="XAU/USD")return 0.35;
  if(["USD/JPY","EUR/JPY","GBP/JPY"].includes(p))return 0.03;
  return 0.0002;
}
function getUTCH(){return new Date().getUTCHours()+new Date().getUTCMinutes()/60;}
function sessActive(s){const h=getUTCH();return s.open<s.close?h>=s.open&&h<s.close:h>=s.open||h<s.close;}
function sessCD(s){
  const now=getUTCH(),tgt=sessActive(s)?s.close:s.open;
  const diff=tgt>now?tgt-now:24-now+tgt;
  const h=Math.floor(diff),m=Math.floor((diff-h)*60);
  return sessActive(s)?`Closes in ${h}h ${m}m`:`Opens in ${h}h ${m}m`;
}

// ── Live Price Hook ───────────────────────────────────────────────────────────
function useLivePrices(){
  const [prices,setPrices]=useState(()=>{
    const p={};
    ALL_PAIRS.forEach(pair=>{
      const d=dec(pair),b=BASE[pair]||1;
      p[pair]={bid:b,ask:+(b+spread(pair)).toFixed(d),change:0,decimals:d,pct:0};
    });
    return p;
  });
  const [liveStatus,setLiveStatus]=useState("connecting"); // connecting | live | simulated
  const prev=useRef({});

  async function fetchAll(){
    try{
      // Fetch all pairs in one request using comma-separated symbols
      const syms=ALL_PAIRS.map(p=>TD_SYM[p]||p).join(",");
      const url=`https://api.twelvedata.com/price?symbol=${encodeURIComponent(syms)}&apikey=${API_KEY}`;
      const res=await fetch(url);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data=await res.json();

      // Check if we got an error response
      if(data.code&&data.code!==200) throw new Error(data.message||"API error");

      let gotAny=false;
      setPrices(curr=>{
        const next={...curr};
        ALL_PAIRS.forEach(pair=>{
          const sym=TD_SYM[pair]||pair;
          // Twelve Data returns either {price:x} directly or nested by symbol
          const entry=data[sym]||data[pair]||
            (Object.keys(data).length===1&&ALL_PAIRS.length===1?data:null);
          if(!entry||entry.status==="error"||!entry.price) return;
          const d=dec(pair);
          const newBid=+parseFloat(entry.price).toFixed(d);
          if(!newBid||isNaN(newBid)) return;
          const prevBid=prev.current[pair]?.bid||newBid;
          const chg=newBid>prevBid?1:newBid<prevBid?-1:0;
          const pct=prevBid?((newBid-prevBid)/prevBid)*100:0;
          next[pair]={bid:newBid,ask:+(newBid+spread(pair)).toFixed(d),change:chg,decimals:d,pct};
          gotAny=true;
        });
        if(gotAny){prev.current={...next};}
        return next;
      });

      if(gotAny){
        setLiveStatus("live");
      } else {
        setLiveStatus("simulated");
      }
    }catch(e){
      console.warn("Live price fetch failed:",e.message);
      setLiveStatus("simulated");
    }
  }

  // Gentle simulation tick (used between live fetches or as fallback)
  function simTick(){
    if(liveStatus==="live") return; // don't drift live prices
    setPrices(curr=>{
      const next={...curr};
      ALL_PAIRS.forEach(pair=>{
        const vol=pair.includes("BTC")?0.003:pair.includes("ETH")?0.003:
          ["US30","NAS100","GER40"].includes(pair)?0.001:0.0005;
        const d=dec(pair);
        const delta=(Math.random()-0.48)*curr[pair].bid*vol;
        const newBid=+((curr[pair].bid+delta).toFixed(d));
        next[pair]={...curr[pair],bid:newBid,ask:+(newBid+spread(pair)).toFixed(d),change:delta>0?1:-1};
      });
      return next;
    });
  }

  useEffect(()=>{
    fetchAll(); // immediate fetch on load
    const liveId=setInterval(fetchAll,15000); // every 15s (uses ~4 calls/min, well within free tier)
    const simId=setInterval(simTick,3000);    // smooth UI between fetches
    return()=>{clearInterval(liveId);clearInterval(simId);};
  },[]);

  return {prices,liveStatus};
}

// ── PIN Screen ────────────────────────────────────────────────────────────────
function PinScreen({onUnlock,C}){
  const savedPin=loadLS("fpro_pin",null);
  const [input,setInput]=useState("");
  const [stage,setStage]=useState(savedPin?"unlock":"setup1"); // setup1|setup2|unlock
  const [firstPin,setFirstPin]=useState("");
  const [shake,setShake]=useState(false);
  const [msg,setMsg]=useState(savedPin?"Enter your PIN":"Create a 4-digit PIN");

  function press(d){
    // prevent double-fire
    const next=input+d;
    setInput(next);
    if(next.length<4)return;

    setTimeout(()=>{
      if(stage==="setup1"){
        setFirstPin(next);setInput("");setStage("setup2");setMsg("Confirm your PIN");
      } else if(stage==="setup2"){
        if(next===firstPin){saveLS("fpro_pin",next);onUnlock();}
        else{doShake("PINs don't match — try again");}
      } else {
        if(next===savedPin){onUnlock();}
        else{doShake("Wrong PIN — try again");}
      }
    },80);
  }

  function doShake(m){
    setShake(true);setInput("");setMsg(m);
    setTimeout(()=>{setShake(false);},600);
  }

  const dots=[0,1,2,3];
  return(
    <div style={{position:"fixed",inset:0,background:C.bg,display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",zIndex:900,
      fontFamily:"'DM Sans','Segoe UI',sans-serif"}}>
      <div style={{fontSize:36,marginBottom:10}}>🔐</div>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:4}}>
        Forex<span style={{color:C.accent}}>Pro</span>
      </div>
      <div style={{fontSize:13,color:C.muted,marginBottom:30,textAlign:"center",padding:"0 40px"}}>{msg}</div>
      <div style={{display:"flex",gap:16,marginBottom:36,
        animation:shake?"shake 0.5s ease":"none"}}>
        {dots.map(i=>(
          <div key={i} style={{width:16,height:16,borderRadius:"50%",
            background:i<input.length?C.accent:C.border,
            transition:"background 0.15s",
            boxShadow:i<input.length?`0 0 10px ${C.accent}88`:"none"}}/>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,width:234}}>
        {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=>{
          const isEmpty=d==="";
          const isDel=d==="⌫";
          return(
            <div key={i}
              onPointerDown={e=>{
                e.preventDefault();
                if(isEmpty)return;
                if(isDel){setInput(p=>p.slice(0,-1));return;}
                if(input.length<4) press(String(d));
              }}
              style={{height:62,borderRadius:14,
                background:isEmpty?"transparent":C.surface,
                border:isEmpty?"none":`1px solid ${C.border}`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:isDel?22:22,fontWeight:700,color:C.text,
                opacity:isEmpty?0:1,cursor:isEmpty?"default":"pointer",
                userSelect:"none",WebkitUserSelect:"none",
                transition:"background 0.1s"}}>
              {d}
            </div>
          );
        })}
      </div>
      {stage==="unlock"&&(
        <div onPointerDown={e=>{e.preventDefault();saveLS("fpro_pin",null);window.location.reload();}}
          style={{marginTop:22,fontSize:12,color:C.dim,padding:"6px 12px",cursor:"pointer"}}>
          Forgot PIN? Reset app

  );

  // Alert form

  // Persist on change
  useEffect(()=>saveLS("fpro_dark",darkMode),[darkMode]);
  useEffect(()=>saveLS("fpro_check",checklist),[checklist]);
  useEffect(()=>saveLS("fpro_wl",watchlist),[watchlist]);
  useEffect(()=>saveLS("fpro_sess",selSessions),[selSessions]);
  useEffect(()=>saveLS("fpro_salert",sessAlerts),[sessAlerts]);
  useEffect(()=>saveLS("fpro_trades",trades),[trades]);
  useEffect(()=>saveLS("fpro_alerts",alerts),[alerts]);
  useEffect(()=>saveLS("fpro_talerts",triggeredAlerts),[triggeredAlerts]);
  useEffect(()=>saveLS("fpro_plan",calcResult),[calcResult]);
  useEffect(()=>saveLS("fpro_bal",balance),[balance]);
  useEffect(()=>saveLS("fpro_goal",goal),[goal]);
  useEffect(()=>saveLS("fpro_risk",riskPct),[riskPct]);
  useEffect(()=>saveLS("fpro_rr",rrRatio),[rrRatio]);
  useEffect(()=>saveLS("fpro_lot",selectedLot),[selectedLot]);
  useEffect(()=>saveLS("fpro_psess",planSession),[planSession]);
  useEffect(()=>saveLS("fpro_ppair",planPair),[planPair]);
  useEffect(()=>saveLS("fpro_pentry",planEntry),[planEntry]);
  useEffect(()=>saveLS("fpro_pdir",planDir),[planDir]);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);

  // Price alerts checker
  useEffect(()=>{
    alerts.forEach(alert=>{
      if(alert.triggered)return;
      const cur=prices[alert.pair]?.bid;if(!cur)return;
      const hit=alert.condition==="above"?cur>=parseFloat(alert.price):cur<=parseFloat(alert.price);
      if(hit){
        setAlerts(prev=>prev.map(a=>a.id===alert.id?{...a,triggered:true}:a));
        setTriggeredAlerts(prev=>[{...alert,triggeredAt:new Date().toLocaleTimeString()},...prev]);
        showNotif(`🔔 ${alert.pair} hit ${alert.price}!`);
      }
    });
  },[prices]);

  function showNotif(msg){setNotification(msg);setTimeout(()=>setNotification(null),3000);}
  function mark(key){setChecklist(p=>({...p,[key]:true}));}

  function toggleWL(pair){
    setWatchlist(prev=>prev.includes(pair)?prev.filter(p=>p!==pair):[...prev,pair]);
    mark("watchlist");
  }
  function toggleSess(n){
    setSelSessions(prev=>prev.includes(n)?prev.filter(s=>s!==n):[...prev,n]);
    mark("session");
  }

  function addAlert(){
    if(!alertForm.price)return;
    setAlerts(prev=>[{...alertForm,id:Date.now(),triggered:false,createdAt:new Date().toLocaleTimeString()},...prev]);
    setAlertForm(p=>({...p,price:""}));
    showNotif("🔔 Alert set!");
  }
  function removeAlert(id){setAlerts(prev=>prev.filter(a=>a.id!==id));}

  function addTrade(){
    if(!tradeForm.pips)return;
    setTrades(prev=>[{...tradeForm,id:Date.now(),date:new Date().toLocaleDateString()},...prev]);
    setTradeForm({pair:"EUR/USD",type:"Buy",pips:"",duration:"",note:""});
    mark("trade");showNotif("📝 Trade logged!");

  function calcPlan(){
    if(!goal||!balance)return;
    const g=parseFloat(goal),b=parseFloat(balance);
    const pipVal=selectedLot.pipValue,rrNum=parseFloat(rrRatio.split(":")[1]);
    const risk=(b*parseFloat(riskPct))/100;
    const profit=risk*rrNum;
    const trades_needed=Math.ceil(g/profit);
    let tp=null,sl=null,tpPips=null,slPips=null;
    if(planEntry&&pipVal>0){
      const entry=parseFloat(planEntry);
      const tpp=profit/pipVal,slp=risk/pipVal;
      tpPips=tpp.toFixed(1);slPips=slp.toFixed(1);
      const ps=pipSz(planPair),d=dec(planPair);
      tp=(planDir==="Buy"?entry+tpp*ps:entry-tpp*ps).toFixed(d);
      sl=(planDir==="Buy"?entry-slp*ps:entry+slp*ps).toFixed(d);
    }
    const result={profit:profit.toFixed(2),trades_needed,risk:risk.toFixed(2),
      session:planSession,pair:planPair,entry:planEntry,dir:planDir,
      tp,sl,tpPips,slPips,rr:rrRatio};
    setCalcResult(result);
    mark("balance");mark("plan");
    showNotif("✅ Plan calculated!");
  }

  function exportJournal(){
    const lines=["ForexPro — Trade Journal","═".repeat(30),""];
    trades.forEach(t=>{
      lines.push(`${t.date} | ${t.pair} | ${t.type} | ${parseFloat(t.pips)>0?"+":""}${t.pips} pips${t.duration?" | ⏱"+t.duration:""}${t.note?" | "+t.note:""}`);
    });
    lines.push("","─".repeat(30));
    lines.push(`Total: ${trades.length} trades | Win Rate: ${winRate}% | Pips: ${totalPips>0?"+":""}${totalPips.toFixed(1)}`);
    if(bestTrade)lines.push(`Best: ${bestTrade.pair} +${bestTrade.pips} pips`);
    if(worstTrade)lines.push(`Worst: ${worstTrade.pair} ${worstTrade.pips} pips`);
    const text=lines.join("\n");
    setExportText(text);
    navigator.clipboard?.writeText(text).then(()=>showNotif("📋 Copied to clipboard!")).catch(()=>showNotif("📋 Text ready to copy"));
  }

  // Derived stats
  const totalPips=trades.reduce((s,t)=>s+parseFloat(t.pips||0),0);
  const winTrades=trades.filter(t=>parseFloat(t.pips)>0).length;
  const loseTrades=trades.filter(t=>parseFloat(t.pips)<0).length;
  const winRate=trades.length?Math.round((winTrades/trades.length)*100):0;

            </div>
            <button onClick={()=>{if(window.confirm("Reset PIN?")){saveLS("fpro_pin",null);window.location.reload();}}}
              style={{...S.btn(C.danger),marginTop:0,fontSize:12}}>🔐 Reset PIN</button>
          </div>
        </>)}

      </div>

      {/* Bottom Nav */}
      <div style={S.nav}>
        {[["dashboard","📊","Home"],["prices","📈","Prices"],["sessions","🕐","Sessions"],["planner","🎯","Planner"],["alerts","🔔","Alerts"],["journal","📝","Journal"],["guide","✅","Guide"]].map(([id,icon,label])=>(
          <button key={id} style={S.nb(activeTab===id)} onClick={()=>setActiveTab(id)}>
            <span style={{fontSize:17}}>{icon}</span>{label}
            {id==="guide"&&!onboardingDone&&<span style={{width:5,height:5,borderRadius:"50%",background:C.warn,display:"block",margin:"-2px auto 0"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ForexPlannerApp));
document.getElementById("loading").style.display="none";
</script>

if("serviceWorker"in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
